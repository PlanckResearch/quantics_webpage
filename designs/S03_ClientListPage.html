            display: inline-block;
            line-height: 1;

            direction: ltr;

<body class="bg-surface-container-low min-h-screen flex flex-col">
<!-- TopAppBar Prediction Implementation -->
<!-- Shell Visibility Note: TopAppBar is maintained for brand identity but navigation is suppressed for focus -->
<header class="bg-[#f8fafa] dark:bg-[#0b132b] text-[#000000] dark:text-[#f8fafa] font-['Public_Sans'] font-bold tracking-tighter uppercase docked full-width top-0 z-50 flex justify-between items-center w-full px-6 py-4">
<div class="text-lg font-black tracking-[-0.02em] text-[#000000] dark:text-[#f8fafa]">
            SYSTEM_ACCESS
        </div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-xl" data-icon="security">security</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-6">
<div class="w-full max-w-md bg-[#f9f9f9] p-10 shadow-none border-none relative overflow-hidden">
<!-- Decorative System Element -->
<div class="absolute top-0 right-0 p-4 font-['Inter_Mono'] text-[10px] text-outline opacity-40 uppercase tracking-widest">
                AUTH_PROTOCOL_V4.02
            </div>
<!-- Brand Header -->
<div class="mb-12">
<h1 class="font-headline font-black text-3xl leading-none tracking-[-0.04em] text-primary mb-1">
                    MARKETPRO PORTAL
                </h1>
<h2 class="font-headline font-bold text-lg tracking-tight text-secondary-container bg-primary-container px-2 py-1 inline-block">
                    SYSTEM ACCESS
                </h2>
</div>
<!-- Login Form -->
<form action="#" class="space-y-10" method="POST">
<!-- Operator ID Input -->
<div class="relative group">
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-2" for="operator-id">
                        OPERATOR_ID
                    </label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-primary py-3 px-0 focus:ring-0 focus:border-primary-container font-body text-primary placeholder-outline-variant transition-all duration-100" id="operator-id" name="operator-id" placeholder="00-X-ALPHA" required="" type="text"/>
</div>
<!-- Passcode Input -->
<div class="relative group">
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-2" for="passcode">
                        PASSCODE
                    </label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-primary py-3 px-0 focus:ring-0 focus:border-primary-container font-body text-primary placeholder-outline-variant transition-all duration-100" id="passcode" name="passcode" placeholder="********" required="" type="password"/>
</div>
<!-- Action Button -->
<button class="w-full bg-[#0B132B] text-on-primary py-4 font-headline font-black uppercase tracking-widest text-sm hover:bg-primary transition-colors duration-100 active:scale-[0.98]" type="submit">
                    AUTHENTICATE
                </button>
</form>
<!-- Footer Links within Login Card -->
<div class="mt-8 flex justify-center">
<a class="font-label text-[10px] uppercase tracking-widest text-primary border-b border-primary hover:text-secondary hover:border-secondary transition-colors duration-100" href="#">
                    FORGOT_PROTOCOL?
                </a>
</div>
<!-- Asymmetric Data Strip -->
<div class="mt-12 flex justify-between items-end border-t border-outline-variant pt-4">
<div class="space-y-1">
<div class="font-label text-[8px] text-outline uppercase">ENCRYPTION_STATUS</div>
<div class="font-label text-[10px] text-primary font-bold">AES_256_ACTIVE</div>
</div>
<div class="text-right">
<div class="font-label text-[8px] text-outline uppercase">TERMINAL_REF</div>
<div class="font-label text-[10px] text-primary">NODE_774_GLOBAL</div>
</div>
</div>
</div>

<!-- Footer Prediction Implementation -->
<footer class="bg-[#f8fafa] dark:bg-[#0b132b] text-[#000000] dark:text-[#f8fafa] font-['Inter_Mono'] text-[8px] uppercase docked full-width bottom-0 border-t-2 border-[#000000] dark:border-[#f8fafa] flex justify-between items-center px-6 py-2 w-full">
<div>
            RESTRICTED_ACCESS_SYSTEM_©_2024

</div>
